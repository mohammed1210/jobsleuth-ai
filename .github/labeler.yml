# PR Labeler configuration for actions/labeler@v5.
frontend:
  - changed-files:
      - any-glob-to-any-file: frontend/**

backend:
  - changed-files:
      - any-glob-to-any-file: backend/**

database:
  - changed-files:
      - any-glob-to-any-file: supabase/**

ops:
  - changed-files:
      - any-glob-to-any-file: ops/**

documentation:
  - changed-files:
      - any-glob-to-any-file: docs/**

ci/cd:
  - changed-files:
      - any-glob-to-any-file: .github/**
